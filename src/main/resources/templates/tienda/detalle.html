<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/tienda}">
<body>
<div th:fragment="content" style="max-width: 900px; margin: 0 auto;">

    <a th:href="@{/tienda}" class="ui button" style="margin-bottom: 20px;">
        <i class="arrow left icon"></i> Volver al catálogo
    </a>

    <div class="ui segment">
        <div class="tienda-detalle-img">
            <img th:if="${producto.imagenUrl != null}" th:src="@{${producto.imagenUrl}}" alt="Imagen del producto">
            <i th:unless="${producto.imagenUrl != null}" class="box icon massive"></i>
        </div>
        <span class="ui teal label" th:text="${producto.categoria != null ? producto.categoria.nombre : 'Sin categoría'}"></span>
        <span class="ui label" th:if="${producto.marca != null and !producto.marca.isEmpty()}" th:text="${producto.marca}"></span>

        <h1 class="ui header" th:text="${producto.nombre}"></h1>
        <p th:text="${producto.descripcion}"></p>

        <h2 style="color:#21ba45;">
            S/ <span th:text="${producto.precio}"></span>
            <span class="hint" style="display:inline; font-size: 0.5em;"
                  th:if="${producto.unidadMedida != null and !producto.unidadMedida.isEmpty()}"
                  th:text="'/ ' + ${producto.unidadMedida}"></span>
        </h2>

        <p>
            <span th:if="${producto.stock != null and producto.stock > 0}"
                  th:text="${producto.stock} + ' unidades disponibles'"></span>
            <span th:unless="${producto.stock != null and producto.stock > 0}" style="color:#db2828; font-weight:bold;">Sin stock</span>
        </p>

        <form th:action="@{/tienda/carrito/agregar}" method="post" class="ui form"
              th:if="${producto.stock != null and producto.stock > 0}">
            <input type="hidden" name="productoId" th:value="${producto.id}">
            <div class="fields" style="align-items: flex-end;">
                <div class="six wide field">
                    <label>Cantidad</label>
                    <input type="number" name="cantidad" min="1" th:max="${producto.stock}" value="1">
                </div>
                <div class="ten wide field">
                    <button type="submit" class="ui primary fluid button">
                        <i class="cart plus icon"></i> Agregar al carrito
                    </button>
                </div>
            </div>
        </form>
    </div>

    <div th:if="${relacionados != null and not #lists.isEmpty(relacionados)}">
        <h3 class="ui header"><i class="thumbs up icon"></i> También te puede interesar</h3>
        <div class="tienda-grid">
            <div class="tienda-card" th:each="p : ${relacionados}">
                <a th:href="@{/tienda/productos/{id}(id=${p.id})}" class="tienda-card-link">
                    <div class="tienda-card-img">
                    <img th:if="${p.imagenUrl != null}" th:src="@{${p.imagenUrl}}" alt="Imagen del producto">
                    <i th:unless="${p.imagenUrl != null}" class="box icon huge"></i>
                </div>
                    <div class="tienda-card-body">
                        <div class="tienda-card-cat" th:text="${p.categoria != null ? p.categoria.nombre : ''}"></div>
                        <div class="tienda-card-nombre" th:text="${p.nombre}"></div>
                        <div class="tienda-card-precio" th:text="'S/ ' + ${p.precio}"></div>
                    </div>
                </a>
                <form th:action="@{/tienda/carrito/agregar}" method="post">
                    <input type="hidden" name="productoId" th:value="${p.id}">
                    <input type="hidden" name="cantidad" value="1">
                    <button type="submit" class="ui fluid primary button" th:disabled="${p.stock == null or p.stock <= 0}">
                        <i class="cart plus icon"></i> Agregar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
