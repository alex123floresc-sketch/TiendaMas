<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/tienda}">
<body>
<div th:fragment="content">

    <h1 class="ui dividing header"><i class="shopping cart icon"></i> Mi Carrito</h1>

    <div class="ui icon info message" th:if="${carrito.empty}">
        <i class="info circle icon"></i>
        <div class="content">Tu carrito está vacío. <a th:href="@{/tienda}">Ir al catálogo</a></div>
    </div>

    <table class="ui celled striped table" th:unless="${carrito.empty}">
        <thead>
        <tr>
            <th>Producto</th>
            <th>Precio</th>
            <th style="width:120px">Cantidad</th>
            <th>Subtotal</th>
            <th style="width:60px"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${carrito.items}">
            <td th:text="${item.nombre}" style="font-weight:bold;"></td>
            <td th:text="'S/ ' + ${item.precioUnitario}"></td>
            <td>
                <form th:action="@{/tienda/carrito/cantidad}" method="post">
                    <input type="hidden" name="productoId" th:value="${item.productoId}">
                    <input type="number" name="cantidad" th:value="${item.cantidad}" min="1"
                           style="width:80px;" onchange="this.form.submit()">
                </form>
            </td>
            <td th:text="'S/ ' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}"></td>
            <td>
                <form th:action="@{/tienda/carrito/quitar/{id}(id=${item.productoId})}" method="post" style="display:contents">
                    <button type="submit" class="ui red icon button" title="Quitar"><i class="trash icon"></i></button>
                </form>
            </td>
        </tr>
        </tbody>
        <tfoot>
        <tr>
            <th colspan="3" style="text-align:right;">Total:</th>
            <th colspan="2" style="color:#21ba45; font-size:1.2em;"
                th:text="'S/ ' + ${#numbers.formatDecimal(carrito.total, 1, 2)}"></th>
        </tr>
        </tfoot>
    </table>

    <div class="form-actions" th:unless="${carrito.empty}">
        <a th:href="@{/tienda/checkout}" class="ui positive big button">
            <i class="credit card icon"></i> Finalizar compra
        </a>
        <form th:action="@{/tienda/carrito/vaciar}" method="post" style="display:contents">
            <button type="submit" class="ui button">Vaciar carrito</button>
        </form>
    </div>

    <div th:if="${recomendados != null and not #lists.isEmpty(recomendados)}" style="margin-top: 30px;">
        <h3 class="ui header"><i class="thumbs up icon"></i> También te puede interesar</h3>
        <div class="tienda-grid">
            <div class="tienda-card" th:each="p : ${recomendados}">
                <a th:href="@{/tienda/productos/{id}(id=${p.id})}" class="tienda-card-link">
                    <div class="tienda-card-img"><i class="box icon huge"></i></div>
                    <div class="tienda-card-body">
                        <div class="tienda-card-cat" th:text="${p.categoria != null ? p.categoria.nombre : ''}"></div>
                        <div class="tienda-card-nombre" th:text="${p.nombre}"></div>
                        <div class="tienda-card-precio" th:text="'S/ ' + ${p.precio}"></div>
                    </div>
                </a>
                <form th:action="@{/tienda/carrito/agregar}" method="post">
                    <input type="hidden" name="productoId" th:value="${p.id}">
                    <input type="hidden" name="cantidad" value="1">
                    <button type="submit" class="ui fluid primary button" th:disabled="${p.stock == null or p.stock <= 0}">
                        <i class="cart plus icon"></i> Agregar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
