<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base}">
<body>
<div th:fragment="content" style="max-width: 700px; margin: 0 auto;">

    <h1 class="ui dividing header">
        <i class="user icon"></i>
        <div class="content">
            Detalle de Cliente
            <div class="sub header">Información completa del cliente registrado.</div>
        </div>
    </h1>

    <div class="details-card">
        <div class="detail-row">
            <span class="label">ID:</span>
            <span th:text="${persona.id}"></span>
        </div>
        <div class="detail-row">
            <span class="label">Nombre:</span>
            <span th:text="${persona.nombre}"></span>
        </div>
        <div class="detail-row">
            <span class="label">Apellido:</span>
            <span th:text="${persona.apellido}"></span>
        </div>
        <div class="detail-row">
            <span class="label">Email:</span>
            <span th:text="${persona.email}"></span>
        </div>
        <div class="detail-row">
            <span class="label">Teléfono:</span>
            <span th:text="${persona.telefono}"></span>
        </div>
        <div class="detail-row">
            <span class="label">Dirección:</span>
            <span th:text="${persona.direccion}"></span>
        </div>
        <div class="detail-row">
            <span class="label">Documento:</span>
            <span th:text="${persona.tipoDocumento} + ' ' + ${persona.numeroDocumento}"></span>
        </div>
        <div class="detail-row" th:if="${persona.razonSocial != null and !persona.razonSocial.isEmpty()}">
            <span class="label">Razón social:</span>
            <span th:text="${persona.razonSocial}"></span>
        </div>
        <div class="detail-row" th:if="${persona.fechaNacimiento != null}">
            <span class="label">Nacimiento:</span>
            <span th:text="${persona.fechaNacimiento}"></span>
        </div>
        <div class="detail-row" th:if="${persona.genero != null}">
            <span class="label">Género:</span>
            <span th:text="${persona.genero}"></span>
        </div>
        <div class="detail-row" th:if="${persona.preferencias != null and !persona.preferencias.isEmpty()}">
            <span class="label">Preferencias:</span>
            <span th:text="${persona.preferencias}"></span>
        </div>
    </div>

    <h3 class="ui header"><i class="chart line icon"></i>Resumen de compras</h3>
    <div class="ui three stackable statistics" style="margin-bottom: 20px;">
        <div class="statistic">
            <div class="value" th:text="'S/ ' + ${#numbers.formatDecimal(totalGastado, 1, 2)}"></div>
            <div class="label">Total gastado</div>
        </div>
        <div class="statistic">
            <div class="value" th:text="${cantidadPedidos}"></div>
            <div class="label">Pedidos realizados</div>
        </div>
        <div class="statistic">
            <div class="value" style="font-size: 1.3rem;"
                 th:text="${ultimaCompra != null} ? ${ultimaCompra.fechaTexto} : 'Sin compras'"></div>
            <div class="label">Última compra</div>
        </div>
    </div>
    <a th:if="${ultimaCompra != null}" th:href="@{/pedidos/{id}(id=${ultimaCompra.id})}" class="ui small button" style="margin-bottom: 20px;">
        <i class="eye icon"></i> Ver última compra
    </a>

    <div class="form-actions">
        <a th:href="@{/personas/{id}/editar(id=${persona.id})}" class="ui yellow button">
            <i class="edit icon"></i> Editar
        </a>
        <a href="/personas" class="ui button">
            <i class="arrow left icon"></i> Volver
        </a>
    </div>
</div>

</body>
</html>
