<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base}">
<body>
<div th:fragment="content" style="max-width: 700px; margin: 0 auto;">

    <h1 class="ui dividing header">
        <i class="user plus icon"></i>
        <div class="content">
            <span th:text="${persona.id != null} ? 'Editar Persona' : 'Crear Nueva Persona'"></span>
            <div class="sub header">Complete la información requerida para el registro en el sistema.</div>
        </div>
    </h1>

    <div class="ui segment">

        <form th:action="${persona.id != null} ? @{/personas/{id}(id=${persona.id})} : @{/personas}"
              th:object="${persona}" method="POST" class="ui form">

            <div class="two fields">
                <div class="field required">
                    <label for="nombre">Nombre</label>
                    <div class="ui left icon input">
                        <i class="user icon"></i>
                        <input type="text" id="nombre" th:field="*{nombre}" required placeholder="Ej. Juan">
                    </div>
                </div>

                <div class="field required">
                    <label for="apellido">Apellido</label>
                    <div class="ui left icon input">
                        <i class="user outline icon"></i>
                        <input type="text" id="apellido" th:field="*{apellido}" required placeholder="Ej. Pérez">
                    </div>
                </div>
            </div>

            <div class="field required">
                <label for="email">Email</label>
                <div class="ui left icon input">
                    <i class="envelope icon"></i>
                    <input type="email" id="email" th:field="*{email}" required placeholder="juan.perez@example.com">
                </div>
            </div>

            <div class="two fields">
                <div class="field">
                    <label for="telefono">Teléfono</label>
                    <div class="ui left icon input">
                        <i class="phone icon"></i>
                        <input type="tel" id="telefono" th:field="*{telefono}" placeholder="987654321">
                    </div>
                </div>

                <div class="field">
                    <label for="direccion">Dirección</label>
                    <div class="ui left icon input">
                        <i class="map marker alternate icon"></i>
                        <input type="text" id="direccion" th:field="*{direccion}" placeholder="Ej. Av. Primavera 123">
                    </div>
                </div>
            </div>

            <div class="ui divider"></div>

            <h4 class="ui header">Datos para boleta / factura</h4>
            <div class="two fields">
                <div class="field required">
                    <label for="tipoDocumento">Tipo de documento</label>
                    <select id="tipoDocumento" th:field="*{tipoDocumento}" class="ui fluid dropdown" required>
                        <option value="">-- Selecciona --</option>
                        <option value="DNI">DNI (Boleta)</option>
                        <option value="RUC">RUC (Factura)</option>
                    </select>
                </div>
                <div class="field required">
                    <label for="numeroDocumento">Número de documento</label>
                    <input type="text" id="numeroDocumento" th:field="*{numeroDocumento}" placeholder="Ej. 12345678" required>
                </div>
            </div>

            <div class="field">
                <label for="razonSocial">Razón social (solo si es RUC)</label>
                <input type="text" id="razonSocial" th:field="*{razonSocial}" placeholder="Ej. Comercial Los Andes S.A.C.">
            </div>

            <div class="ui divider"></div>

            <div class="form-actions">
                <button type="submit" class="ui positive button">
                    <i class="save icon"></i> Guardar
                </button>
                <a href="/personas" class="ui button">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
