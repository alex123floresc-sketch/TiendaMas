<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Personas</title>
    <!-- Mantenemos tu CSS por si tienes estilos adicionales -->
    <link rel="stylesheet" th:href="@{/static.css/estilos.css}">

    <!-- Añadimos Semantic UI para dar el salto profesional -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.5.0/semantic.min.css">
</head>
<body>
<div class="wrapper" style="display: flex; background-color: #f4f7f6; min-height: 100vh;">

    <!-- Mantenemos intacto tu menú original -->
    <div th:replace="~{layout/fragments :: menu}"></div>

    <!-- Ajustamos el contenedor para darle orden, tamaño y espaciado limpio -->
    <div class="content" style="flex: 1; padding: 40px; box-sizing: border-box;">
        <div class="container" style="max-width: 1200px; margin: 0 auto;">

            <!-- Título con encabezado semántico profesional -->
            <h1 class="ui dividing header" style="color: #2c3e50; margin-bottom: 20px;">
                <i class="users icon"></i>
                <div class="content">
                    Gestión de Personas
                    <div class="sub header">Administra el registro de usuarios del sistema.</div>
                </div>
            </h1>

            <!-- Botón principal estilizado con Semantic UI (Color Azul Corporativo) -->
            <div style="margin-bottom: 25px;">
                <a href="/personas/nuevo" class="ui primary button">
                    <i class="plus icon"></i> Agregar Nueva Persona
                </a>
            </div>

            <!-- Mensaje alternativo si la lista está vacía (Convertido en una alerta semántica elegante) -->
            <div th:if="${personas == null or #lists.isEmpty(personas)}" class="ui icon warning message">
                <i class="info circle icon"></i>
                <div class="content">
                    <div class="header">Base de datos vacía</div>
                    <p>No hay personas registradas en el sistema actualmente.</p>
                </div>
            </div>

            <!-- Tabla transformada a una estructura estructurada, limpia y profesional -->
            <table class="ui celled striped table" th:if="${personas != null and not #lists.isEmpty(personas)}">
                <thead>
                <tr>
                    <th class="one wide">ID</th>
                    <th class="five wide">Nombre</th>
                    <th class="four wide">Email</th>
                    <th class="three wide">Teléfono</th>
                    <th class="three wide center aligned">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="persona : ${personas}">
                    <td th:text="${persona.id}"></td>
                    <td th:text="${persona.nombre}" style="font-weight: bold; color: #2c3e50;"></td>
                    <td th:text="${persona.email}"></td>
                    <td th:text="${persona.telefono}"></td>
                    <td class="center aligned">
                        <!-- Grupo de botones compactos con iconos limpios -->
                        <div class="ui small buttons">
                            <a th:href="@{/personas/{id}(id=${persona.id})}" class="ui info button" title="Ver">
                                <i class="eye icon"></i>
                            </a>
                            <a th:href="@{/personas/{id}/editar(id=${persona.id})}" class="ui yellow button" title="Editar">
                                <i class="edit icon"></i>
                            </a>
                            <a th:href="@{/personas/{id}/eliminar(id=${persona.id})}" class="ui red button" th:onclick="return confirm('¿Está seguro?')" title="Eliminar">
                                <i class="trash icon"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
