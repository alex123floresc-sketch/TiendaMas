<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión · TiendaMas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.5.0/semantic.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="login-page">

<div class="login-box">
    <div class="ui raised segment">

        <h2 class="ui header">
            <i class="shop icon"></i>
            <div class="content">
                TiendaMas
                <div class="sub header">Introduce tus credenciales para continuar</div>
            </div>
        </h2>

        <div class="ui negative message" th:if="${param.error}">
            <div class="header">Error de autenticación</div>
            <p>El usuario o la contraseña son incorrectos.</p>
        </div>

        <div class="ui info message" th:if="${param.logout}">
            <p>Has cerrado sesión correctamente.</p>
        </div>

        <form th:action="@{/login}" method="POST" class="ui form">

            <div class="field">
                <label>Usuario</label>
                <div class="ui left icon input">
                    <i class="user icon"></i>
                    <input type="text" name="username" placeholder="Nombre de usuario" required autofocus>
                </div>
            </div>

            <div class="field">
                <label>Contraseña</label>
                <div class="ui left icon input">
                    <i class="lock icon"></i>
                    <input type="password" name="password" placeholder="Tu contraseña" required>
                </div>
            </div>

            <button class="ui fluid primary large submit button" type="submit">
                Ingresar
            </button>
        </form>
    </div>

    <p class="login-footer">&copy; 2026 Facultad de Ingeniería de Sistemas - UNAJ</p>
</div>

</body>
</html>
