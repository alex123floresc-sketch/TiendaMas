<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base}">
<body>
<div th:fragment="content" style="max-width: 700px; margin: 0 auto;">

    <h1 class="ui dividing header">
        <i class="money bill wave icon"></i>
        <div class="content">
            <span th:text="${gasto.id != null} ? 'Editar Gasto' : 'Nuevo Gasto'"></span>
            <div class="sub header">Registra un gasto operativo del negocio.</div>
        </div>
    </h1>

    <div class="ui segment">
        <form th:action="${gasto.id != null} ? @{/gastos/{id}(id=${gasto.id})} : @{/gastos}"
              th:object="${gasto}" method="POST" class="ui form">

            <input type="hidden" th:field="*{id}" />

            <div class="field required">
                <label>Concepto</label>
                <input type="text" th:field="*{concepto}" placeholder="Ej. Alquiler de local, Recibo de luz" required>
            </div>

            <div class="two fields">
                <div class="field required">
                    <label>Categoría</label>
                    <select th:field="*{categoria}" class="ui fluid dropdown" required>
                        <option value="">-- Selecciona --</option>
                        <option value="ALQUILER">Alquiler</option>
                        <option value="SERVICIOS">Servicios (luz, agua, internet)</option>
                        <option value="INSUMOS">Insumos y mercadería</option>
                        <option value="MARKETING">Marketing y publicidad</option>
                        <option value="OTROS">Otros</option>
                    </select>
                </div>
                <div class="field required">
                    <label>Monto (S/)</label>
                    <input type="number" step="0.01" min="0" th:field="*{monto}" placeholder="0.00" required>
                </div>
            </div>

            <div class="field required">
                <label>Fecha</label>
                <input type="date" th:field="*{fecha}" required>
            </div>

            <div class="field">
                <div class="ui checkbox">
                    <input type="checkbox" id="recurrente" th:field="*{recurrente}">
                    <label for="recurrente">Es un gasto recurrente (podrás "repetirlo" cada mes desde el listado)</label>
                </div>
            </div>

            <div class="field">
                <label>Frecuencia</label>
                <select th:field="*{frecuencia}" class="ui fluid dropdown">
                    <option value="UNICO">Único</option>
                    <option value="SEMANAL">Semanal</option>
                    <option value="MENSUAL">Mensual</option>
                </select>
            </div>

            <div class="field">
                <label>Notas</label>
                <textarea th:field="*{notas}" rows="2" placeholder="Detalles adicionales (opcional)"></textarea>
            </div>

            <div class="ui divider"></div>

            <div class="form-actions">
                <button type="submit" class="ui positive button">
                    <i class="save icon"></i> Guardar
                </button>
                <a href="/gastos" class="ui button">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
