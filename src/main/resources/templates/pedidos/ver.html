<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base}">
<body>
<div th:fragment="content" style="max-width: 1000px; margin: 0 auto;">

    <h1 class="ui dividing header">
        <i class="clipboard list icon"></i>
        <div class="content">
            Detalle del Pedido #<span th:text="${pedido.id}"></span>
            <div class="sub header">Información detallada y resumen de productos.</div>
        </div>
    </h1>

    <div class="ui segment" style="margin-bottom: 30px;">
        <h3 class="ui header"><i class="user icon"></i>Información del Cliente</h3>
        <div class="ui list">
            <div class="item">
                <div class="header">Cliente:</div>
                <span th:text="${pedido.persona.nombre + ' ' + pedido.persona.apellido}"></span>
            </div>
            <div class="item">
                <div class="header">Email:</div>
                <span th:text="${pedido.persona.email}"></span>
            </div>
            <div class="item">
                <div class="header">Fecha:</div>
                <span th:text="${pedido.fechaTexto}"></span>
            </div>
        </div>
    </div>

    <h3 class="ui header"><i class="shopping basket icon"></i>Productos del pedido</h3>
    <table class="ui celled striped table">
        <thead>
        <tr>
            <th>Producto</th>
            <th>Precio Unitario</th>
            <th>Cantidad</th>
            <th>Subtotal</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="det : ${pedido.detalles}">
            <td th:text="${det.producto.nombre}" style="font-weight: bold;"></td>
            <td th:text="'$' + ${det.precioUnitario}"></td>
            <td th:text="${det.cantidad}"></td>
            <td th:text="'$' + ${det.subtotal}"></td>
        </tr>
        </tbody>
        <tfoot>
        <tr>
            <th colspan="3" style="text-align:right;">TOTAL:</th>
            <th style="color: #21ba45; font-size: 1.2em;" th:text="'$' + ${pedido.total}"></th>
        </tr>
        </tfoot>
    </table>

    <div style="margin-top: 20px;">
        <a href="/pedidos" class="ui secondary button">
            <i class="arrow left icon"></i> Volver al listado
        </a>
    </div>

</div>
</body>
</html>
