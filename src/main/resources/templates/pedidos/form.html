<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base}">
<body>
<div th:fragment="content" style="max-width: 900px; margin: 0 auto;">

    <h1 class="ui dividing header">
        <i class="shopping cart icon"></i>
        <div class="content">
            Nueva Venta
            <div class="sub header">Gestione los productos del nuevo pedido.</div>
        </div>
    </h1>

    <div class="ui segment">

        <form th:object="${pedidoForm}" th:action="@{/pedidos}" method="POST" class="ui form">

            <div class="field required">
                <label>Cliente</label>
                <select th:field="*{personaId}" class="ui search dropdown" required>
                    <option value="">-- Selecciona un cliente --</option>
                    <option th:each="p : ${personas}"
                            th:value="${p.id}"
                            th:text="${p.nombre + ' ' + p.apellido}"></option>
                </select>
            </div>

            <div class="field">
                <label>Productos del pedido</label>
                <table class="ui celled striped table">
                    <thead>
                    <tr>
                        <th style="width:50px">#</th>
                        <th>Producto</th>
                        <th style="width:150px">Cantidad</th>
                        <th style="width:80px">Acción</th>
                    </tr>
                    </thead>
                    <tbody id="detalleBody">
                    </tbody>
                </table>
                <button type="button" class="ui blue small button" onclick="agregarFila()">
                    <i class="plus icon"></i> Agregar producto
                </button>
                <small class="hint">Agrega todos los productos que necesites. Puedes quitar filas con el botón X.</small>
            </div>

            <div class="field required">
                <label>Método de pago</label>
                <select th:field="*{metodoPago}" class="ui fluid dropdown" required>
                    <option value="EFECTIVO">Efectivo</option>
                    <option value="TARJETA">Tarjeta de crédito/débito</option>
                    <option value="YAPE_PLIN">Yape / Plin</option>
                    <option value="TRANSFERENCIA">Transferencia bancaria</option>
                </select>
            </div>

            <div class="ui divider"></div>

            <div class="form-actions">
                <button type="submit" class="ui positive button">
                    <i class="save icon"></i> Guardar Pedido
                </button>
                <a href="/pedidos" class="ui button">Cancelar</a>
            </div>

        </form>
    </div>
</div>

<select id="productoRef" style="display:none">
    <option value="">-- Selecciona un producto --</option>
    <option th:each="p : ${productos}"
            th:value="${p.id}"
            th:text="${p.nombre + ' ($' + p.precio + ')'}"></option>
</select>

<style>
    .hint { color: var(--color-text-muted); font-size: 13px; margin-top: 10px; display: block; }
</style>

<script>
    let rowIndex = 0;

    function agregarFila() {
        const tbody  = document.getElementById('detalleBody');
        const numFila = tbody.rows.length + 1;
        const idx    = rowIndex++;

        const tr = document.createElement('tr');

        // Columna #
        const tdNum = document.createElement('td');
        tdNum.style.textAlign = 'center';
        tdNum.innerHTML = `<strong>${numFila}</strong>`;
        tr.appendChild(tdNum);

        // Columna producto
        const refSelect = document.getElementById('productoRef');
        const select = refSelect.cloneNode(true);
        select.id = '';
        select.style.display = 'block';
        select.name     = 'detalles[' + idx + '].productoId';
        select.className = 'ui search fluid dropdown';
        select.required  = true;
        const tdSelect = document.createElement('td');
        tdSelect.appendChild(select);
        tr.appendChild(tdSelect);

        // Columna cantidad
        const input = document.createElement('input');
        input.type      = 'number';
        input.name      = 'detalles[' + idx + '].cantidad';
        input.className = 'ui input fluid';
        input.min       = '1';
        input.value     = '1';
        input.required  = true;
        const tdCantidad = document.createElement('td');
        tdCantidad.appendChild(input);
        tr.appendChild(tdCantidad);

        // Columna quitar
        const btn = document.createElement('button');
        btn.type      = 'button';
        btn.className = 'ui red icon button';
        btn.innerHTML = '<i class="trash icon"></i>';
        btn.onclick   = function () { eliminarFila(this); };
        const tdBtn = document.createElement('td');
        tdBtn.style.textAlign = 'center';
        tdBtn.appendChild(btn);
        tr.appendChild(tdBtn);

        tbody.appendChild(tr);

        $(tdSelect).find('.ui.dropdown').dropdown();
    }

    function eliminarFila(btn) {
        btn.closest('tr').remove();
        reindexar();
    }

    function reindexar() {
        const rows = document.querySelectorAll('#detalleBody tr');
        rows.forEach(function (tr, i) {
            tr.cells[0].textContent = i + 1;
            tr.querySelectorAll('[name]').forEach(function (el) {
                el.name = el.name.replace(/detalles\[\d+\]/, 'detalles[' + i + ']');
            });
        });
        rowIndex = rows.length;
    }

    document.addEventListener('DOMContentLoaded', function () {
        agregarFila();
        $('.ui.search.dropdown').dropdown();
    });
</script>
</body>
</html>
