<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="menu" class="ui vertical inverted menu sidebar-menu"
     th:with="uri=${currentUri}">

  <div class="item brand-item">
    <h2 class="ui inverted header brand-header">
      <i class="shop icon"></i>
      <div class="content">
        TiendaMas
        <div class="sub header">Sistema de Ventas</div>
      </div>
    </h2>
  </div>

  <div class="ui inverted divider"></div>

  <a href="/" class="item" th:classappend="${uri == '/'} ? 'active-link'"><i class="home icon"></i> Inicio</a>
  <a href="/personas" class="item" th:classappend="${uri != null and uri.startsWith('/personas')} ? 'active-link'"><i class="users icon"></i> Personas</a>
  <a href="/categorias" class="item" th:classappend="${uri != null and uri.startsWith('/categorias')} ? 'active-link'"><i class="tags icon"></i> Categorías</a>
  <a href="/productos" class="item" th:classappend="${uri != null and uri.startsWith('/productos')} ? 'active-link'"><i class="cube icon"></i> Productos</a>
  <a href="/pedidos" class="item" th:classappend="${uri != null and uri.startsWith('/pedidos')} ? 'active-link'"><i class="shopping cart icon"></i> Pedidos</a>
  <a href="/reportes" class="item" th:classappend="${uri != null and uri.startsWith('/reportes')} ? 'active-link'"><i class="chart bar icon"></i> Reportes</a>

  <div class="ui inverted divider"></div>

  <a href="/logout" class="item logout-item"><i class="sign out alternate icon"></i> Salir</a>
</nav>
</body>
</html>
