<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="menu" class="ui vertical inverted menu sidebar-menu"
     th:with="uri=${currentUri}">

  <a href="/" class="item brand-item">
    <h2 class="ui inverted header brand-header">
      <span class="brand-icon-badge"><i class="shop icon"></i></span>
      <div class="content">
        TiendaMas
        <div class="sub header">Panel Administrador</div>
      </div>
    </h2>
  </a>

  <div class="menu-scroll">

    <div class="item menu-section-label">Catálogo</div>
    <a href="/productos" class="item" th:classappend="${uri != null and uri.startsWith('/productos')} ? 'active-link'">
      <span class="menu-icon"><i class="cube icon"></i></span> Productos</a>
    <a href="/categorias" class="item" th:classappend="${uri != null and uri.startsWith('/categorias')} ? 'active-link'">
      <span class="menu-icon"><i class="tags icon"></i></span> Categorías</a>

    <div class="item menu-section-label">Ventas</div>
    <a href="/pedidos" class="item" th:classappend="${uri != null and uri.startsWith('/pedidos')} ? 'active-link'">
      <span class="menu-icon"><i class="shopping cart icon"></i></span> Ventas</a>
    <a href="/reportes" class="item" th:classappend="${uri != null and uri.startsWith('/reportes')} ? 'active-link'">
      <span class="menu-icon"><i class="chart bar icon"></i></span> Reportes</a>

    <div class="item menu-section-label">Finanzas</div>
    <a href="/gastos" class="item" th:classappend="${uri != null and uri.startsWith('/gastos')} ? 'active-link'">
      <span class="menu-icon"><i class="money bill wave icon"></i></span> Gastos</a>
    <a href="/sueldos" class="item" th:classappend="${uri != null and uri.startsWith('/sueldos')} ? 'active-link'">
      <span class="menu-icon"><i class="id badge icon"></i></span> Sueldos</a>

    <div class="item menu-section-label">Clientes</div>
    <a href="/personas" class="item" th:classappend="${uri != null and uri.startsWith('/personas')} ? 'active-link'">
      <span class="menu-icon"><i class="users icon"></i></span> Clientes</a>

  </div>

  <div class="menu-bottom">
    <a href="/perfil" class="item" th:classappend="${uri != null and uri.startsWith('/perfil')} ? 'active-link'">
      <span class="menu-icon"><i class="user icon"></i></span> Mi perfil</a>

    <form th:action="@{/logout}" method="post" class="item logout-item">
      <button type="submit" class="logout-link-button">
        <span class="menu-icon"><i class="sign out alternate icon"></i></span> Salir</button>
    </form>
  </div>
</nav>
</body>
</html>
