<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="menu" class="admin-navbar" th:with="uri=${currentUri}">
  <div class="admin-navbar-bar">

    <a href="/" class="admin-brand">
      <span class="admin-brand-badge"><i class="shop icon"></i></span>
      <span class="admin-brand-text">TiendaMas <small>Panel Administrador</small></span>
    </a>

    <button type="button" class="admin-nav-toggle" onclick="document.querySelector('.admin-nav-links').classList.toggle('open')">
      <i class="bars icon"></i>
    </button>

    <div class="admin-nav-links">

      <div class="ui dropdown admin-nav-item" th:classappend="${uri != null and (uri.startsWith('/productos') or uri.startsWith('/categorias'))} ? 'active'">
        <i class="cube icon"></i> Catálogo <i class="dropdown icon"></i>
        <div class="menu">
          <a href="/productos" class="item"><i class="cube icon"></i> Productos</a>
          <a href="/categorias" class="item"><i class="tags icon"></i> Categorías</a>
        </div>
      </div>

      <div class="ui dropdown admin-nav-item" th:classappend="${uri != null and (uri.startsWith('/pedidos') or uri.startsWith('/reportes'))} ? 'active'">
        <i class="shopping cart icon"></i> Ventas <i class="dropdown icon"></i>
        <div class="menu">
          <a href="/pedidos" class="item"><i class="list icon"></i> Pedidos</a>
          <a href="/reportes" class="item"><i class="chart bar icon"></i> Reportes</a>
        </div>
      </div>

      <div class="ui dropdown admin-nav-item" th:classappend="${uri != null and (uri.startsWith('/gastos') or uri.startsWith('/sueldos'))} ? 'active'">
        <i class="money bill wave icon"></i> Finanzas <i class="dropdown icon"></i>
        <div class="menu">
          <a href="/gastos" class="item"><i class="money bill wave icon"></i> Gastos</a>
          <a href="/sueldos" class="item"><i class="id badge icon"></i> Sueldos</a>
        </div>
      </div>

      <a href="/personas" class="admin-nav-item" th:classappend="${uri != null and uri.startsWith('/personas')} ? 'active'">
        <i class="users icon"></i> Clientes
      </a>

      <div class="admin-nav-spacer"></div>

      <div class="ui dropdown admin-nav-item admin-nav-account" th:classappend="${uri != null and uri.startsWith('/perfil')} ? 'active'">
        <i class="user icon"></i> <span th:text="${usuarioAutenticado}">Usuario</span> <i class="dropdown icon"></i>
        <div class="menu">
          <a href="/perfil" class="item"><i class="id card icon"></i> Mi perfil</a>
          <a href="/pos" class="item"><i class="cash register icon"></i> Punto de venta</a>
          <div class="divider"></div>
          <form th:action="@{/logout}" method="post" class="item logout-link-form">
            <button type="submit" class="logout-link-button"><i class="sign out alternate icon"></i> Salir</button>
          </form>
        </div>
      </div>

    </div>
  </div>

  <script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {
      $('.admin-navbar .ui.dropdown').dropdown();
    });
  </script>
</nav>
</body>
</html>
