<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="menu" th:with="uri=${currentUri}">

  <header class="admin-topbar">
    <button type="button" class="admin-nav-toggle" aria-label="Abrir menú"
            onclick="document.querySelector('.admin-sidebar').classList.toggle('open'); document.querySelector('.admin-sidebar-overlay').classList.toggle('open')">
      <i class="bars icon"></i>
    </button>
    <a href="/" class="admin-topbar-brand">
      <span class="admin-brand-badge"><i class="shop icon"></i></span>
      <span>TiendaMas</span>
    </a>
  </header>

  <div class="admin-sidebar-overlay"
       onclick="document.querySelector('.admin-sidebar').classList.remove('open'); this.classList.remove('open')"></div>

  <aside class="admin-sidebar">

    <a href="/" class="admin-brand">
      <span class="admin-brand-badge"><i class="shop icon"></i></span>
      <span class="admin-brand-text">TiendaMas <small>Panel Administrador</small></span>
    </a>

    <nav class="admin-sidebar-nav">

      <div class="admin-nav-section-label">Catálogo</div>
      <a href="/productos" class="admin-nav-item" th:classappend="${uri != null and uri.startsWith('/productos')} ? 'seccion-actual'">
        <i class="cube icon"></i> Productos
      </a>
      <a href="/categorias" class="admin-nav-item" th:classappend="${uri != null and uri.startsWith('/categorias')} ? 'seccion-actual'">
        <i class="tags icon"></i> Categorías
      </a>

      <div class="admin-nav-section-label">Ventas</div>
      <a href="/pedidos" class="admin-nav-item" th:classappend="${uri != null and uri.startsWith('/pedidos')} ? 'seccion-actual'">
        <i class="list icon"></i> Pedidos
      </a>
      <a href="/reportes" class="admin-nav-item" th:classappend="${uri != null and uri.startsWith('/reportes')} ? 'seccion-actual'">
        <i class="chart bar icon"></i> Reportes
      </a>

      <div class="admin-nav-section-label">Finanzas</div>
      <a href="/gastos" class="admin-nav-item" th:classappend="${uri != null and uri.startsWith('/gastos')} ? 'seccion-actual'">
        <i class="money bill wave icon"></i> Gastos
      </a>
      <a href="/sueldos" class="admin-nav-item" th:classappend="${uri != null and uri.startsWith('/sueldos')} ? 'seccion-actual'">
        <i class="id badge icon"></i> Sueldos
      </a>

      <div class="admin-nav-section-label">Personas</div>
      <a href="/personas" class="admin-nav-item" th:classappend="${uri != null and uri.startsWith('/personas')} ? 'seccion-actual'">
        <i class="users icon"></i> Clientes
      </a>
      <a href="/usuarios" class="admin-nav-item" th:classappend="${uri != null and uri.startsWith('/usuarios')} ? 'seccion-actual'">
        <i class="user shield icon"></i> Usuarios
      </a>

    </nav>

    <div class="admin-sidebar-footer">
      <a href="/pos" class="admin-nav-item">
        <i class="cash register icon"></i> Punto de venta
      </a>
      <a href="/perfil" class="admin-nav-item" th:classappend="${uri != null and uri.startsWith('/perfil')} ? 'seccion-actual'">
        <i class="user icon"></i> <span th:text="${usuarioAutenticado}">Usuario</span>
      </a>
      <form th:action="@{/logout}" method="post" class="logout-link-form">
        <button type="submit" class="logout-link-button"><i class="sign out alternate icon"></i> Salir</button>
      </form>
    </div>

  </aside>
</div>
</body>
</html>
