<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="menu" class="ui vertical inverted menu sidebar-menu"
     th:with="uri=${currentUri}">

  <a href="/" class="item brand-item">
    <h2 class="ui inverted header brand-header">
      <i class="shop icon"></i>
      <div class="content">
        TiendaMas
        <div class="sub header">Panel Administrador</div>
      </div>
    </h2>
  </a>

  <div class="ui inverted divider"></div>

  <div class="item menu-section-label">Catálogo</div>
  <a href="/productos" class="item" th:classappend="${uri != null and uri.startsWith('/productos')} ? 'active-link'"><i class="cube icon"></i> Productos</a>
  <a href="/categorias" class="item" th:classappend="${uri != null and uri.startsWith('/categorias')} ? 'active-link'"><i class="tags icon"></i> Categorías</a>

  <div class="item menu-section-label">Ventas</div>
  <a href="/pedidos" class="item" th:classappend="${uri != null and uri.startsWith('/pedidos')} ? 'active-link'"><i class="shopping cart icon"></i> Ventas</a>
  <a href="/reportes" class="item" th:classappend="${uri != null and uri.startsWith('/reportes')} ? 'active-link'"><i class="chart bar icon"></i> Reportes</a>

  <div class="item menu-section-label">Finanzas</div>
  <a href="/gastos" class="item" th:classappend="${uri != null and uri.startsWith('/gastos')} ? 'active-link'"><i class="money bill wave icon"></i> Gastos</a>
  <a href="/sueldos" class="item" th:classappend="${uri != null and uri.startsWith('/sueldos')} ? 'active-link'"><i class="id badge icon"></i> Sueldos</a>

  <div class="item menu-section-label">Clientes</div>
  <a href="/personas" class="item" th:classappend="${uri != null and uri.startsWith('/personas')} ? 'active-link'"><i class="users icon"></i> Clientes</a>

  <div class="ui inverted divider"></div>

  <a href="/perfil" class="item" th:classappend="${uri != null and uri.startsWith('/perfil')} ? 'active-link'"><i class="user icon"></i> Mi perfil</a>

  <form th:action="@{/logout}" method="post" class="item logout-item">
    <button type="submit" class="logout-link-button"><i class="sign out alternate icon"></i> Salir</button>
  </form>
</nav>
</body>
</html>
