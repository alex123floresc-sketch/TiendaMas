<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${titulo != null} ? ${titulo} + ' · TiendaMas POS' : 'TiendaMas · Punto de Venta'"></title>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.5.0/semantic.min.css">
  <link rel="stylesheet" th:href="@{/css/estilos.css}">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.5.0/semantic.min.js"></script>
</head>
<body class="pos-body">

<div class="pos-topbar">
  <a th:href="@{/pos}" class="pos-brand"><i class="cash register icon"></i> TiendaMas <span>POS</span></a>
  <button type="button" class="pos-nav-toggle" onclick="document.querySelector('.pos-topbar-actions').classList.toggle('open')">
    <i class="bars icon"></i>
  </button>
  <div class="pos-topbar-actions">
    <span class="pos-user" th:if="${usuarioAutenticado}">
      <i class="user icon"></i> <span th:text="${usuarioAutenticado}"></span>
    </span>
    <a th:href="@{/pos/ventas}" class="ui small button"><i class="list icon"></i> Mis ventas</a>
    <a th:href="@{/perfil}" class="ui small button"><i class="user icon"></i> Mi perfil</a>
    <form th:action="@{/logout}" method="post" style="display:contents">
      <button type="submit" class="ui small red button"><i class="sign out alternate icon"></i> Salir</button>
    </form>
  </div>
</div>

<div class="pos-content">
  <div th:insert="~{this :: content}"></div>
</div>

</body>
</html>
