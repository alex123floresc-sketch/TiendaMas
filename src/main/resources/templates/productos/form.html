<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base}">
<body>
<div th:fragment="content" style="max-width: 700px; margin: 0 auto;">

    <h1 class="ui dividing header">
        <i class="box icon"></i>
        <div class="content">
            <span th:text="${producto.id != null} ? 'Editar Producto' : 'Nuevo Producto'"></span>
            <div class="sub header">Gestione los datos del artículo y su asignación de inventario.</div>
        </div>
    </h1>

    <div class="ui segment">

        <form th:object="${producto}"
              th:action="${producto.id == null} ? @{/productos} : @{/productos/{id}(id=${producto.id})}"
              method="POST" class="ui form">

            <input type="hidden" th:field="*{id}" />

            <div class="field required">
                <label for="nombre">Nombre del Producto</label>
                <div class="ui left icon input">
                    <i class="font icon"></i>
                    <input type="text" id="nombre" th:field="*{nombre}" placeholder="Ej. Laptop, Teclado" required>
                </div>
            </div>

            <div class="field">
                <label for="descripcion">Descripción</label>
                <div class="ui left icon input">
                    <i class="file text icon"></i>
                    <input type="text" id="descripcion" th:field="*{descripcion}" placeholder="Breve detalle del artículo">
                </div>
            </div>

            <div class="two fields">
                <div class="field required">
                    <label for="precio">Precio (S/)</label>
                    <div class="ui left icon input">
                        <i class="money bill alternate icon"></i>
                        <input type="number" step="0.01" min="0" id="precio" th:field="*{precio}" placeholder="0.00" required>
                    </div>
                </div>

                <div class="field required">
                    <label for="stock">Stock Inicial</label>
                    <div class="ui left icon input">
                        <i class="warehouse icon"></i>
                        <input type="number" min="0" id="stock" th:field="*{stock}" placeholder="0" required>
                    </div>
                </div>
            </div>

            <div class="field required">
                <label for="categoriaId">Categoría</label>
                <select id="categoriaId" name="categoriaId" class="ui fluid dropdown" required>
                    <option value="">-- Seleccione una Categoría --</option>
                    <option th:each="cat : ${categorias}"
                            th:value="${cat.id}"
                            th:text="${cat.nombre}"
                            th:selected="${producto.categoria != null and producto.categoria.id == cat.id}">
                    </option>
                </select>
            </div>

            <div class="field">
                <label for="codigoBarras">Código de barras</label>
                <div class="ui left icon input">
                    <i class="barcode icon"></i>
                    <input type="text" id="codigoBarras" th:field="*{codigoBarras}" placeholder="Ej. 7750001000011 (para escanear en el POS)">
                </div>
            </div>

            <div class="two fields">
                <div class="field">
                    <label for="marca">Marca</label>
                    <input type="text" id="marca" th:field="*{marca}" placeholder="Ej. Gloria, Samsung">
                </div>
                <div class="field">
                    <label for="unidadMedida">Unidad de medida</label>
                    <input type="text" id="unidadMedida" th:field="*{unidadMedida}" placeholder="Ej. kg, unidad, paquete, litro">
                </div>
            </div>

            <div class="ui divider"></div>

            <div class="form-actions">
                <button type="submit" class="ui blue button">
                    <i class="save icon"></i> Guardar Producto
                </button>
                <a href="/productos" class="ui button">
                    Cancelar
                </a>
            </div>
        </form>

        <script>
            $(document).ready(function () {
                $('.ui.dropdown').dropdown();
            });
        </script>
    </div>
</div>
</body>
</html>
