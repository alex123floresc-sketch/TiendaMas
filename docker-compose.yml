services:
  mysql:
    image: mysql:8.0
    container_name: tiendamas-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: TiendaMas
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-mysql123@}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-mysql123@}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: tiendamas-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PORT: 9097
      DB_URL: jdbc:mysql://mysql:3306/TiendaMas?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-mysql123@}
      ADMIN_USERNAME: ${ADMIN_USERNAME:?Define ADMIN_USERNAME en tu archivo .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Define ADMIN_PASSWORD en tu archivo .env}
    ports:
      - "9097:9097"
    volumes:
      - uploads_data:/app/uploads

volumes:
  mysql_data:
  uploads_data:
